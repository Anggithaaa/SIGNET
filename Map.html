<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebGIS Bangunan Bantul</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<style>
body { margin:0; font-family:Arial; }

/* ===== LANDING ===== */
#home{
    height:100vh;
    background:linear-gradient(
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.6)
    ), url('LOGO PRODI GEOMATIKA.jpg');
    background-size:cover;
    background-position:center;

    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#home h1{ font-size:50px; }
#home p{ font-size:18px; margin:15px 0; }

#home button{
    padding:12px 25px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* ===== MAP PAGE ===== */
#mapPage{ display:none; }

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:50px;
    background:#0b1f3a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
    z-index:10;
}

.nav-title{ font-weight:bold; }

.nav-menu{
    display:flex;
    gap:10px;
    margin-right:30px;
}

.nav-menu button{
    padding:6px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.nav-menu button:nth-child(1){
    background:#16a34a;
    color:white;
}

.nav-menu button:nth-child(2){
    background:#ef4444;
    color:white;
}

.nav-menu button:nth-child(3){
    background:#16a34a;
    color:white;
}

/* MAP */
#map{
    position:absolute;
    top:50px;
    bottom:50px;
    width:100%;
}

/* LAYER */
.layer-control{
    position:absolute;
    bottom:70px;
    left:10px;
    background:white;
    padding:10px;
    border-radius:6px;
    z-index:5;
    box-shadow:0 2px 6px rgba(0,0,0,0.3);
}

/* FOOTER */
footer{
    position:absolute;
    bottom:0;
    width:100%;
    height:50px;
    background:#0b1f3a;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<!-- ===== LANDING ===== -->
<div id="home">
    <h1>PENERAPAN SISTEM INFORMASI GEOGRAFIS</h1>
    <p>Bangunan di Kapanewon Bantul</p>
    <button onclick="showMap()">Selengkapnya</button>
</div>

<!-- ===== MAP ===== -->
<div id="mapPage">

<div class="navbar">
    <div class="nav-title">Bangunan di Kapanewon Bantul</div>
    <div class="nav-menu">
        <button onclick="flyToCenter()">Pusat</button>
        <button onclick="kembali()">Kembali</button>
        <button onclick="aktifkanRute()">Cari Rute</button>
    </div>
</div>

<div id="map"></div>

<footer>
    © IzzaAnggithaAryanawa_117230030
</footer>

<script>

// NAVIGASI
function showMap(){
    document.getElementById('home').style.display = 'none';
    document.getElementById('mapPage').style.display = 'block';
    setTimeout(() => map.resize(), 300);
}

function flyToCenter(){
    map.flyTo({
        center: [110.327542,  -7.887432],
        zoom: 16,
        duration: 2000
    });
}

function kembali() {
    window.location.href = "Minggu 6.html";
}

// ================= TOKEN =================
mapboxgl.accessToken = 'pk.eyJ1IjoiYW5nZ2l0aGFhYSIsImEiOiJjbW5waDZtenIyOGZwMnFwdGd3OGViNnV6In0.kq3mgAfB0XT_mlm5XJmZdQ';

// ================= MAP =================
var map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/streets-v11',
    center: [110.327542,  -7.887432],
    zoom: 12
});

map.addControl(new mapboxgl.NavigationControl());

// ================= LOAD GEOJSON =================
map.on('load', function () {

    map.addSource('bangunan', {
        type: 'geojson',
        data: 'Bantul/Building_KecBantul_filtered.geojson'
    });

    map.addLayer({
        id: 'bangunan-layer',
        type: 'fill',
        source: 'bangunan',
        paint: {
            'fill-color': [
                'match',
                ['get', 'jenis'], // GANTI SESUAI FIELD
                'A', '#ff0000',
                'B', '#0000ff',
                '#aaaaaa'
            ],
            'fill-opacity': 0.6
        }
    });

});

// ================= POPUP =================
map.on('click', 'bangunan-layer', function (e) {

    var p = e.features[0].properties;

    var isi =
        "<b>Info Bangunan</b><br>" +
        "Nama: " + (p.nama || "-") + "<br>" +
        "Jenis: " + (p.jenis || "-");

    new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(isi)
        .addTo(map);
});

// cursor
map.on('mouseenter', 'bangunan-layer', () => {
    map.getCanvas().style.cursor = 'pointer';
});
map.on('mouseleave', 'bangunan-layer', () => {
    map.getCanvas().style.cursor = '';
});

// ================= ROUTING =================
let titik = [];
let modeRute = false;
let markerAwal, markerAkhir;

function aktifkanRute() {
    titik = [];
    modeRute = true;

    // hapus marker lama
    if (markerAwal) markerAwal.remove();
    if (markerAkhir) markerAkhir.remove();

    alert("Klik 2 titik di peta: awal & tujuan");
}

map.on('click', function (e) {

    if (!modeRute) return;

    titik.push([e.lngLat.lng, e.lngLat.lat]);

    // marker awal
    if (titik.length == 1) {
        markerAwal = new mapboxgl.Marker({ color: 'green' })
            .setLngLat(titik[0])
            .addTo(map);
    }

    // marker tujuan
    if (titik.length == 2) {
        markerAkhir = new mapboxgl.Marker({ color: 'red' })
            .setLngLat(titik[1])
            .addTo(map);

        ambilRute(titik[0], titik[1]);
        modeRute = false;
    }

});

// ================= AMBIL RUTE =================
function ambilRute(start, end) {

    var url = 'https://api.mapbox.com/directions/v5/mapbox/driving/'
        + start[0] + ',' + start[1] + ';'
        + end[0] + ',' + end[1]
        + '?geometries=geojson&access_token=' + mapboxgl.accessToken;

    fetch(url)
    .then(res => res.json())
    .then(data => {

        var route = data.routes[0].geometry;

        if (map.getSource('route')) {
            map.getSource('route').setData(route);
        } else {
            map.addSource('route', {
                type: 'geojson',
                data: route
            });

            map.addLayer({
                id: 'route',
                type: 'line',
                source: 'route',
                paint: {
                    'line-color': '#00ff00',
                    'line-width': 4
                }
            });
        }

        let jarak = (data.routes[0].distance / 1000).toFixed(2);
        alert("Jarak: " + jarak + " km");

    });
}

</script>
